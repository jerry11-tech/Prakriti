<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrakritiAI - User Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-container {
            padding: 100px 2rem 2rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 2rem;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .history-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 1.5rem;
        }
        .history-card h3 { color: #c4b5fd; margin-bottom: 1rem; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .btn-logout {
            background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer;
        }
        .btn-logout:hover { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-logo">
            <div class="logo-gem">P</div>
            <div class="logo-name">Prakriti<span>AI</span></div>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="dashboard.html" style="color: #c4b5fd">Dashboard</a>
        </div>
        <button class="btn-logout" id="logout-btn">Logout</button>
    </nav>

    <div class="dashboard-container">
        <div class="header-box">
            <div>
                <h1 id="welcome-msg">Welcome, User</h1>
                <p style="color:#94a3b8">Here is your Prakriti analysis history.</p>
            </div>
            <a href="index.html#demo" class="btn-primary">New Analysis</a>
        </div>

        <div class="history-grid" id="history-grid">
            <!-- Populated by JS -->
        </div>
    </div>

<script>
    const API_BASE_URL = window.location.port === '3000' ? '' : (window.__PRAKRITI_API_URL || 'http://localhost:3000');
    const token = localStorage.getItem('token');
    const name = localStorage.getItem('name');
    
    if(!token) {
        window.location.href = 'login.html';
    }

    document.getElementById('welcome-msg').textContent = `Welcome, ${name}`;

    document.getElementById('logout-btn').addEventListener('click', () => {
        localStorage.clear();
        window.location.href = 'login.html';
    });

    async function loadHistory() {
        try {
            const res = await fetch(`${API_BASE_URL}/api/analyse/history`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            
            const grid = document.getElementById('history-grid');
            if(data.length === 0) {
                grid.innerHTML = '<p>No history found.</p>';
            } else {
                grid.innerHTML = data.map(item => `
                    <div class="history-card">
                        <h3>Analysis on ${new Date(item.timestamp).toLocaleDateString()}</h3>
                        <div class="data-row"><span>Result:</span> <strong style="color:#5eead4">${item.prakritiResult || 'Face Scan'}</strong></div>
                        <div class="data-row"><span>Face Shape:</span> <span>${item.faceShape || 'N/A'}</span></div>
                        <div class="data-row"><span>Health/Conf:</span> <span>${item.skin_health_score || item.confidence || 'N/A'}</span></div>
                        
                        <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: flex-start;">
                            <button onclick="downloadReport()" class="btn-primary" style="font-size:0.8rem; padding: 0.4rem 0.8rem; cursor: pointer;">&#128196; Download Report</button>
                            <button onclick="emailReport()" style="background: transparent; border: 1px solid #7c3aed; color: #c4b5fd; font-size:0.8rem; padding: 0.4rem 0.8rem; border-radius: 8px; cursor: pointer;">&#9993; Email Report</button>
                        </div>
                    </div>
                `).join('');
            }
        } catch(e) {
            console.error('Failed to load history', e);
        }
    }

    async function downloadReport() {
        try {
            const res = await fetch(`${API_BASE_URL}/api/reports/download`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ format: 'html' })
            });

            if (!res.ok) throw new Error("Failed to download");
            
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Prakriti_Report_${name}.html`;
            document.body.appendChild(a);
            a.click();
            a.remove();
        } catch (e) {
            alert('Error generating report: ' + e.message);
        }
    }

    async function emailReport() {
        try {
            alert('Sending email... please wait.');
            const res = await fetch(`${API_BASE_URL}/api/reports/email`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            const data = await res.json();
            if (res.ok) {
                alert('Email dispatched successfully to your registered email address!');
            } else {
                throw new Error(data.error || "Failed to send email");
            }
        } catch (e) {
            alert('Error sending email: ' + e.message);
        }
    }
    
    loadHistory();
</script>
</body>
</html>
